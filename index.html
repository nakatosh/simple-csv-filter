<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSV抽出アプリ（文字コード自動判別）</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f0f4f8">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    body {
      font-family: sans-serif;
      padding: 30px;
      background-color: #f0f4f8;
      color: #333;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #fff;
      padding: 20px 30px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    h2 { text-align: center; }
    h3 { font-size: 16px; font-weight: normal; margin-bottom: 20px; }
    input[type="text"] {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-bottom: 20px;
    }
    #drop-zone {
      width: 100%;
      height: 200px;
      border: 2px dashed #90caf9;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #e3f2fd;
      color: #1565c0;
      font-size: 18px;
      font-weight: bold;
      transition: 0.2s;
    }
    #drop-zone.dragover {
      background-color: #bbdefb;
      border-color: #1976d2;
      color: #0d47a1;
    }
  </style>
</head>

<body>
<div class="container">
  <h2>CSV抽出アプリ</h2>
  <h3>検索ワードを入力してCSVをドロップすると、該当行のみ抽出します。</h3>

  <p>1. 検索ワード</p>
  <input type="text" id="search-word" placeholder="例：東京都">

  <p>2. CSVファイル</p>
  <div id="drop-zone">ここにCSVをドラッグ＆ドロップ</div>
</div>

<script>
const dropZone = document.getElementById('drop-zone');
const searchInput = document.getElementById('search-word');

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('dragover');
});

dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('dragover');
});

dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');

  const keyword = searchInput.value.trim();
  if (!keyword) {
    alert('検索ワードを入力してください。');
    return;
  }

  const file = e.dataTransfer.files[0];
  if (!file || !file.name.toLowerCase().endsWith('.csv')) {
    alert('CSVファイルを指定してください。');
    return;
  }

  const reader = new FileReader();
  reader.readAsArrayBuffer(file);

  reader.onload = event => {
    const buffer = event.target.result;
    const uint8 = new Uint8Array(buffer);
    let csvText = '';

    try {
      csvText = new TextDecoder('utf-8', { fatal: true }).decode(uint8);
    } catch {
      csvText = new TextDecoder('shift_jis').decode(uint8);
    }

    processCSV(csvText, keyword, file.name);
  };
});

function processCSV(csvData, keyword, originalName) {
  const lines = csvData.split(/\r?\n/);
  if (lines.length === 0) return;

  const result = [];
  result.push(lines[0]); // ヘッダ

  for (let i = 1; i < lines.length; i++) {
    if (lines[i].includes(keyword)) {
      result.push(lines[i]);
    }
  }

  if (result.length === 1) {
    alert('一致する行がありません。');
    return;
  }

  const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
  const blob = new Blob([bom, result.join('\n')], { type: 'text/csv' });

  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'filtered_' + originalName;
  a.click();
  URL.revokeObjectURL(url);
}

// Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js');
  });
}
</script>
</body>
